<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IGS Outdoor CRM</title>
    <meta name="description" content="IGS Outdoor — внутренняя CRM система"/>
    <link rel="manifest" href="/manifest.json"/>

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="IGS CRM"/>
    <link rel="apple-touch-icon" href="/appletouchicon.png"/>

    <!-- Android / Desktop PWA -->
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="application-name" content="IGS CRM"/>
    <meta name="theme-color" content="#b8965a"/>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png"/>
    <link rel="shortcut icon" type="image/png" href="/favicon.png"/>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { -webkit-font-smoothing: antialiased; background: #09090b; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #09090b; }
      ::-webkit-scrollbar-thumb { background: rgba(184,150,90,0.3); border-radius: 2px; }

      /* ── iOS Print Fix: показываем только iframe при печати ── */
      @media print {
        body > div#root { display: none !important; }
        #__igs_print_frame__ {
          position: fixed !important;
          top: 0 !important; left: 0 !important;
          width: 100% !important; height: 100% !important;
          border: none !important;
          opacity: 1 !important;
          pointer-events: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] registered', reg.scope))
            .catch(err => console.warn('[SW] error', err));
        });
      }
    </script>
  </body>
</html>
